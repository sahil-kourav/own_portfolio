<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#11151f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <!-- Background card -->
  <rect x="4" y="4" width="248" height="248" rx="56" fill="url(#bgGrad)" stroke="#1e2433" stroke-width="2"/>

  <!-- Monogram -->
  <text x="128" y="148" font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="104" fill="#ffffff" text-anchor="middle">SK</text>

  <!-- Code-bracket accent -->
  <text x="128" y="196" font-family="Consolas, 'Courier New', monospace" font-weight="700"
        font-size="30" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="2">&lt;/&gt;</text>

  <!-- Status dot, echoes the "available for work" indicator -->
  <circle cx="208" cy="52" r="7" fill="#64748b"/>
</svg>
